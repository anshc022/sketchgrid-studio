<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#1D4A3A"/>
  <!-- Grid lines - horizontal -->
  <line x1="64" y1="160" x2="448" y2="160" stroke="#5FB6E8" stroke-width="8" opacity="0.7"/>
  <line x1="64" y1="256" x2="448" y2="256" stroke="#5FB6E8" stroke-width="8" opacity="0.7"/>
  <line x1="64" y1="352" x2="448" y2="352" stroke="#5FB6E8" stroke-width="8" opacity="0.7"/>
  <!-- Grid lines - vertical -->
  <line x1="160" y1="64" x2="160" y2="448" stroke="#5FB6E8" stroke-width="8" opacity="0.7"/>
  <line x1="256" y1="64" x2="256" y2="448" stroke="#5FB6E8" stroke-width="8" opacity="0.7"/>
  <line x1="352" y1="64" x2="352" y2="448" stroke="#5FB6E8" stroke-width="8" opacity="0.7"/>
  <!-- Border grid -->
  <rect x="64" y="64" width="384" height="384" rx="4" fill="none" stroke="#5FB6E8" stroke-width="10" opacity="0.9"/>
  <!-- Subject circle -->
  <circle cx="256" cy="220" r="72" fill="white" opacity="0.92"/>
  <!-- Shadow ellipse -->
  <ellipse cx="256" cy="340" rx="55" ry="14" fill="white" opacity="0.25"/>
</svg>

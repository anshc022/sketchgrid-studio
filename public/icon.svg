<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2E2B29"/>
      <stop offset="1" stop-color="#1B1918"/>
    </linearGradient>
    <radialGradient id="sphere" cx="0.35" cy="0.3" r="1">
      <stop offset="0" stop-color="#F7F2E7"/>
      <stop offset="0.45" stop-color="#E4D9C2"/>
      <stop offset="0.8" stop-color="#B39A6F"/>
      <stop offset="1" stop-color="#6E5638"/>
    </radialGradient>
    <linearGradient id="pencil" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7AC4EE"/>
      <stop offset="1" stop-color="#4795C4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="6" y="6" width="500" height="500" rx="106" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="2"/>

  <!-- Grid: 4x4 non-photo blue -->
  <g stroke="#5FB6E8" stroke-width="7" opacity="0.55">
    <line x1="172" y1="88" x2="172" y2="424"/>
    <line x1="256" y1="88" x2="256" y2="424"/>
    <line x1="340" y1="88" x2="340" y2="424"/>
    <line x1="88" y1="172" x2="424" y2="172"/>
    <line x1="88" y1="256" x2="424" y2="256"/>
    <line x1="88" y1="340" x2="424" y2="340"/>
  </g>
  <rect x="88" y="88" width="336" height="336" rx="10" fill="none" stroke="#5FB6E8" stroke-width="12" opacity="0.95"/>

  <!-- Sphere subject with cast shadow -->
  <ellipse cx="262" cy="352" rx="86" ry="20" fill="#000000" opacity="0.35"/>
  <circle cx="250" cy="242" r="92" fill="url(#sphere)"/>
  <circle cx="222" cy="212" r="30" fill="#FFFFFF" opacity="0.5"/>

  <!-- Pencil crossing the grid, drawing the sphere -->
  <g transform="rotate(-38 380 300)">
    <rect x="352" y="150" width="46" height="216" rx="8" fill="url(#pencil)"/>
    <rect x="352" y="342" width="46" height="14" fill="#D9B98C"/>
    <path d="M352 356 L375 412 L398 356 Z" fill="#E8CFA6"/>
    <path d="M367 392 L375 412 L383 392 Z" fill="#3A3733"/>
  </g>
</svg>
